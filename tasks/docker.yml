---
- name: Install Docker dependencies
  become: yes
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common

# TODO: use ansible.builtin.deb822_repository
- name: Download Docker GPG key
  become: yes
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker-gpg-key

- name: Add Docker GPG key
  become: yes
  ansible.builtin.shell: cat /tmp/docker-gpg-key | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/docker.gpg > /dev/null

- name: Add Docker repository
  become: yes
  apt_repository:
    repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ release.stdout }} stable
    state: present

- name: Update apt cache after adding Docker repository
  become: yes
  apt:
    update_cache: yes

- name: Install Docker packages
  become: yes
  apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io

- name: Create Docker group
  become: yes
  group:
    name: docker
    state: present

- name: Add current user to Docker group
  become: yes
  user:
    name: "{{ login_user.stdout }}"
    groups: docker
    append: yes

- name: Update user groups
  ansible.builtin.group:
    name: docker
    state: present

- name: Install Docker compose
  become: yes
  apt:
    pkg:
      - docker-compose-plugin

# Docker Desktop (for Claude sandbox)
- name: Check if Docker Desktop is installed
  ansible.builtin.command: dpkg -s docker-desktop
  register: docker_desktop_check
  failed_when: false
  changed_when: false

- name: Download Docker Desktop
  become: yes
  get_url:
    url: https://desktop.docker.com/linux/main/amd64/docker-desktop-amd64.deb
    dest: /tmp/docker-desktop-amd64.deb
    mode: '0644'
  when: docker_desktop_check.rc != 0

- name: Install Docker Desktop
  become: yes
  apt:
    deb: /tmp/docker-desktop-amd64.deb
    state: present
  when: docker_desktop_check.rc != 0

- name: Clean up Docker Desktop installer
  become: yes
  file:
    path: /tmp/docker-desktop-amd64.deb
    state: absent
  when: docker_desktop_check.rc != 0
